name: Release

on:
  release:
    types: [published]

jobs:
  publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/ms-entrance
    permissions:
      id-token: write   # PyPI trusted publishing (OIDC)
      contents: write   # push version-bump commit back to main

    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false

      - name: Set up Python
        run: uv python install 3.11

      - name: Determine release version
        id: version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Release version: $VERSION"

      - name: Sync pyproject.toml version to release tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          CURRENT=$(grep -E '^version = ' pyproject.toml | head -1 | cut -d'"' -f2)
          if [ "$CURRENT" = "$VERSION" ]; then
            echo "pyproject.toml version is already $VERSION - no bump needed"
            exit 0
          fi
          echo "Bumping pyproject.toml from $CURRENT to $VERSION"
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" pyproject.toml
          git config user.email "79938743+Pianonic@users.noreply.github.com"
          git config user.name "PianoNic"
          git add pyproject.toml
          git commit -m "Bump version to $VERSION [skip ci]"
          git push origin main

      - name: Build distributions
        run: uv build

      - name: Verify with twine check
        run: uvx twine check --strict dist/*

      - name: Publish to PyPI
        run: uv publish --trusted-publishing always
